<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Purple rounded background -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="#8B5CF6"/>
  
  <!-- Calendar body (white) -->
  <rect x="14" y="18" width="36" height="32" rx="4" ry="4" fill="white"/>
  
  <!-- Calendar top binding tabs -->
  <rect x="22" y="12" width="4" height="10" rx="2" ry="2" fill="white"/>
  <rect x="38" y="12" width="4" height="10" rx="2" ry="2" fill="white"/>
  
  <!-- Calendar header bar -->
  <rect x="14" y="18" width="36" height="10" rx="4" ry="0" fill="#8B5CF6" opacity="0.3"/>
  
  <!-- Calendar grid dots -->
  <circle cx="24" cy="36" r="2.5" fill="#8B5CF6"/>
  <circle cx="32" cy="36" r="2.5" fill="#8B5CF6"/>
  <circle cx="40" cy="36" r="2.5" fill="#8B5CF6"/>
  <circle cx="24" cy="44" r="2.5" fill="#8B5CF6"/>
  <circle cx="32" cy="44" r="2.5" fill="#8B5CF6"/>
  <circle cx="40" cy="44" r="2.5" fill="#8B5CF6"/>
</svg>
